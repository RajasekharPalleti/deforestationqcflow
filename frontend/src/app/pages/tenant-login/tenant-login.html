<div class="tenant-login-page">
  <div class="brand-panel">
    <div class="hex-pattern"></div>

    <svg class="deco-icon icon-droplet" viewBox="0 0 24 24"><path d="M12 2s6 7 6 11a6 6 0 1 1-12 0c0-4 6-11 6-11z"/></svg>
    <svg class="deco-icon icon-leaf" viewBox="0 0 24 24"><path d="M4 20c8 0 16-8 16-16-8 0-16 8-16 16z"/><path d="M4 20c0-6 4-10 10-12"/></svg>
    <svg class="deco-icon icon-cloud" viewBox="0 0 24 24"><path d="M6 18a4 4 0 0 1 0-8 5 5 0 0 1 9.6-1.5A4.5 4.5 0 0 1 18 18H6z"/></svg>
    <svg class="deco-icon icon-db" viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="8" ry="3"/><path d="M4 5v14c0 1.7 3.6 3 8 3s8-1.3 8-3V5"/><path d="M4 12c0 1.7 3.6 3 8 3s8-1.3 8-3"/></svg>

    <div class="brand-copy">
      <h1><b>Cropin</b> Cloud</h1>
      <p>World's first intelligent agriculture cloud</p>
    </div>

    <div class="brand-footer">Cropin Technology Solutions Pvt Ltd.</div>
  </div>

  <div class="form-panel">
    <div class="form-card">
      <img src="cropin-cloud-logo.svg" alt="Cropin" class="brand-logo" />
      <p class="subtitle">Log into Your Cropin Cloud Account</p>

      <div class="field">
        <label>Environment</label>
        <select [ngModel]="environment()" (ngModelChange)="environment.set($event)">
          <option *ngFor="let e of environments" [value]="e">{{ e }}</option>
        </select>
      </div>

      <div class="field">
        <label>Tenant Name</label>
        <input type="text" [ngModel]="tenant()" (ngModelChange)="onTenantInput($event)" autocomplete="off" />
        <div class="field-hint" *ngIf="tenant() && !tenantValid()">
          Lowercase letters and numbers only, no spaces or symbols.
        </div>
      </div>

      <div class="field">
        <label>Username</label>
        <input type="text" [ngModel]="username()" (ngModelChange)="username.set($event)" autocomplete="off" />
      </div>

      <div class="field">
        <label>Password</label>
        <div class="password-row">
          <input [type]="showPassword() ? 'text' : 'password'" [ngModel]="password()"
                 (ngModelChange)="password.set($event)" autocomplete="off" />
          <button type="button" class="show-toggle" (click)="togglePasswordVisibility()">
            {{ showPassword() ? 'HIDE' : 'SHOW' }}
          </button>
        </div>
      </div>

      <p class="error" *ngIf="authError()">{{ authError() }}</p>

      <button class="login-btn" (click)="login()" [disabled]="!canSubmit() || authenticating()">
        {{ authenticating() ? 'Logging in…' : 'Login' }}
      </button>

      <p class="forgot-link">Forgot Password?</p>

      <button type="button" class="back-btn" (click)="backToMain()">Back to main page</button>
    </div>
  </div>
</div>
