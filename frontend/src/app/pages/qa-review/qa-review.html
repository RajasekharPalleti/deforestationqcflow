<h2>✅ Pending QA &nbsp;—&nbsp; {{ workspace.tenant() }} ({{ workspace.environment() }})</h2>

<p class="caption" *ngIf="dashboardStats.stats() as s">
  <b>{{ s.pendingQaPlots }}</b> plot{{ s.pendingQaPlots === 1 ? '' : 's' }} pending QA
</p>

<hr />

<app-plot-board
  [fixedTab]="fixedTab"
  reviewTypeOverride="QA"
  emptyMessage="Nothing to review — no plots are pending QA. ✅"
></app-plot-board>
