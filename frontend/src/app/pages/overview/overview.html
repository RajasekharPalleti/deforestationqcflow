<h2 class="page-title">
  <img src="/deforestation-icon.svg" alt="" class="title-icon" />
  {{ workspace.tenant() }} &nbsp;({{ workspace.environment() }}) &nbsp;—&nbsp;
  {{ workspace.modelName() }} Dashboard
</h2>

<div class="info-box" *ngIf="!dashboardStats.stats()">
  No data loaded yet. Click <b>📥 Load Dashboard</b> in the sidebar.
</div>

<div class="cards-row" *ngIf="dashboardStats.stats()">
  <button
    type="button"
    class="card"
    *ngFor="let c of cards"
    [class.card-active]="isCardActive(c)"
    [style.border-top-color]="c.color"
    (click)="selectCard(c)"
  >
    <div class="value">{{ valueFor(c.key) }}</div>
    <div class="label">{{ c.label }}</div>
  </button>
</div>

<hr />

<app-plot-board [emptyMessage]="noPlotsMessage()" [allowReview]="allowReview()"></app-plot-board>
