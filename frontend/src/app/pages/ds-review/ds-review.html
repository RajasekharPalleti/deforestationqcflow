<h2>🔬 QA Done / Awaiting DS &nbsp;—&nbsp; {{ workspace.tenant() }} ({{ workspace.environment() }})</h2>

<p class="caption" *ngIf="dashboardStats.stats() as s">
  <b>{{ s.qaDoneAwaitingDsPlots }}</b> plot{{ s.qaDoneAwaitingDsPlots === 1 ? '' : 's' }} awaiting DS review
</p>

<hr />

<app-plot-board
  [fixedTab]="fixedTab"
  reviewTypeOverride="DS"
  emptyMessage="Nothing to review — no plots are awaiting DS. ✅"
></app-plot-board>
