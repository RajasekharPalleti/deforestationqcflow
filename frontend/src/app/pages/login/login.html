<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <img src="orbitai-icon.svg" alt="" class="emoji" />
      <h2>Cropin QC Validation Tool</h2>
      <p class="subtitle">internal app to validate the deforestation</p>
    </div>
    <hr />

    <label class="field-label">Department</label>
    <select [ngModel]="department()" (ngModelChange)="onDepartmentChange($event)">
      <option *ngFor="let d of departments()" [value]="d">{{ d }}</option>
    </select>

    <label class="field-label">Your Name</label>
    <select [ngModel]="name()" (ngModelChange)="onNameChange($event)">
      <option *ngFor="let n of namesForDepartment()" [value]="n">{{ n }}</option>
    </select>

    <ng-container *ngIf="isOtherSelected()">
      <label class="field-label">Enter Your Name</label>
      <input
        type="text"
        [ngModel]="customName()"
        (ngModelChange)="customName.set($event)"
        placeholder="Your name"
      />
    </ng-container>

    <div class="spacer"></div>

    <button class="btn-primary" (click)="continue()" [disabled]="submitting() || !canContinue()">
      {{ submitting() ? 'Signing in...' : 'Continue' }}
    </button>

    <p class="error" *ngIf="error()">{{ error() }}</p>
  </div>
</div>
